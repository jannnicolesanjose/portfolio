<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Jann Nicole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#E50914', darkBg: '#0a0a0a' } } } }
    </script>
</head>
<body class="bg-darkBg text-white h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center space-y-8 animate-in fade-in zoom-in duration-700">
        <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-primary/10 border-2 border-primary text-primary mb-4">
            <i data-lucide="check-circle-2" class="w-12 h-12"></i>
        </div>
        <h1 class="text-4xl font-black uppercase tracking-tighter">Message Received<span class="text-primary">.</span></h1>
        <p class="text-gray-400 font-mono italic">"Thank you for reaching out. I'll get back to you as soon as I read your message."</p>
        <div class="pt-8">
            <a href="index.html" class="inline-flex items-center gap-3 px-10 py-4 bg-primary text-white font-bold rounded-xl uppercase tracking-widest text-sm hover:scale-105 transition-transform shadow-lg shadow-primary/30">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Portfolio
            </a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
